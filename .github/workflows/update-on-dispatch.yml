name: Update gitignore manifest

on:
  repository_dispatch:
    types: [gitignore-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.6.0)"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$DISPATCH_VERSION" ]; then
            TAG="$DISPATCH_VERSION"
          else
            TAG="$INPUT_VERSION"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Compute hash and update manifest
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          ZIP_URL="https://github.com/convergent-systems-co/gitignore/releases/download/${TAG}/gitignore-${TAG}-windows-amd64.zip"
          curl -fsSL "$ZIP_URL" -o /tmp/gitignore.zip
          HASH=$(sha256sum /tmp/gitignore.zip | awk '{print $1}')
          echo "Updating to version $VER ($HASH)"
          jq --arg ver "$VER" --arg url "$ZIP_URL" --arg hash "$HASH" \
            '.version = $ver | .url = $url | .hash = $hash' \
            bucket/gitignore.json > /tmp/gitignore.json
          mv /tmp/gitignore.json bucket/gitignore.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/gitignore.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "gitignore: bump to ${{ steps.ver.outputs.version }}"
          git push
